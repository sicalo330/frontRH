<app-header></app-header>
<form method="post" [formGroup]="dataCandidates">
    <div class="form-group col-md-4">
        <label for="exampleInputNombre">Nombre</label>
        <input type="text" class="form-control" id="exampleInputNombre" formControlName="nombre">
        <span class="danger" *ngIf="dataCandidates.get('nombre')!.invalid && dataCandidates.get('nombre')!.touched">La descripción es <strong>obligatoria</strong></span>
    </div>
    <div class="form-group col-md-4">
        <label for="exampleInputEdad">Correo</label>
        <input type="email" class="form-control" id="exampleInputCorreo" formControlName="correo">
        <span class="danger" *ngIf="dataCandidates.get('correo')!.invalid && dataCandidates.get('correo')!.touched">La descripción es <strong>obligatoria</strong></span>
    </div>
    <div class="form-group col-md-4">
        <label for="exampleInputEdad">cargo</label>
        <input type="text" class="form-control" id="exampleInputEdad" formControlName="cargo">
        <span class="danger" *ngIf="dataCandidates.get('cargo')!.invalid && dataCandidates.get('cargo')!.touched">La descripción es <strong>obligatoria</strong></span>
    </div>
    <div class="form-group col-md-4">
        <label for="exampleInputEdad">experiencia</label>
        <input type="number" class="form-control" id="exampleInputexperiencia" formControlName="experiencia">
        <span class="danger" *ngIf="dataCandidates.get('experiencia')!.invalid && dataCandidates.get('experiencia')!.touched">La descripción es <strong>obligatoria</strong></span>
    </div>
    <div class="form-group col-md-4">
        <label for="exampleInputEdad">puntaje</label>
        <input type="number" class="form-control" id="exampleInputpuntaje" formControlName="puntaje">
        <span class="danger" *ngIf="dataCandidates.get('puntaje')!.invalid && dataCandidates.get('puntaje')!.touched">La descripción es <strong>obligatoria</strong></span>
    </div>
    <div class="form-group col-md-4">
        <label for="exampleInputEstado">Estado</label>
        <select class="form-control" id="exampleInputEstado" formControlName="estado">
            <option value="">Seleccione un estado</option>
            <option value="Entrevista">Entrevista</option>
            <option value="Pendiente">Pendiente</option>
        </select>
        <span class="danger" *ngIf="dataCandidates.get('estado')!.invalid && dataCandidates.get('estado')!.touched"> El estado es <strong>obligatorio</strong></span>
    </div>
    <div class="form-group col-md-4">
        <label for="exampleInputEdad">Salario</label>
        <input type="number" class="form-control" id="exampleInputpuntaje" formControlName="salario">
        <span class="danger" *ngIf="dataCandidates.get('salario')!.invalid && dataCandidates.get('salario')!.touched">La descripción es <strong>obligatoria</strong></span>
    </div>
    <div class="form-group col-md-4">
        <label for="exampleInputEdad">Ajuste</label>
        <input type="number" class="form-control" id="exampleInputpuntaje" formControlName="ajuste">
            <span class="danger" *ngIf="dataCandidates.get('ajuste')!.invalid && dataCandidates.get('ajuste')!.touched">La descripción es <strong>obligatoria</strong></span>
    </div>
    <button class="btn btn-primary" (click)="createStudent()">Create</button>
</form>
