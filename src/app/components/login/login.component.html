<div class="login-page">
  <div class="logo-header">RRHH</div>

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="login-card">
      <h2 class="login-title">Iniciar sesión</h2>
      
      <form [formGroup]="datosUsuario" (ngSubmit)="enviarDatos()">
        <div class="form-group mb-4">
          <label class="form-label">Usuario</label>
          <input type="email" class="form-input" formControlName="correo">
          <small class="error-text" *ngIf="datosUsuario.get('correo')!.invalid && datosUsuario.get('correo')!.touched">
            La Identificación es obligatoria
          </small>
        </div>

        <div class="form-group mb-4">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-input" formControlName="contrasena">
          <small class="error-text" *ngIf="datosUsuario.get('contrasena')!.invalid && datosUsuario.get('contrasena')!.touched">
            La contraseña es obligatoria
          </small>
        </div>

        <div class="text-center">
          <button type="submit" class="btn-login" [disabled]="datosUsuario.invalid">Iniciar</button>
          <div class="mt-3">
            <a href="#" class="forgot-password">Olvidé mi contraseña</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
