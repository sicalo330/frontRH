<div class="container p-4">
    <h2 class="mb-4 fw-bold">Editar Candidato</h2>
    <form [formGroup]="dataCandidates">
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" formControlName="nombre">
        </div>
        <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" formControlName="correo">
        </div>
        <div class="mb-3">
            <label class="form-label">Cargo</label>
            <input type="text" class="form-control"formControlName="cargo">
        </div>

        <div class="mb-3">
            <label class="form-label">Experiencia</label>
            <input type="text" class="form-control"formControlName="experiencia">
        </div>
        <div class="mb-3">
            <label class="form-label">Puntaje</label>
            <input type="number" class="form-control" formControlName="puntaje">
        </div>
        <div class="mb-4">
            <label class="form-label">Estado</label>
            <select class="form-select" formControlName="estado">
                <option value="Entrevista">Entrevista</option>
                <option value="Pendiente">Pendiente</option>
            </select>

        </div>

        <div class="d-flex gap-2 justify-content-end">
            <button type="button"class="btn btn-secondary"(click)="dialogRef.close()">Cancelar</button>
            <button type="button" class="btn btn-success" (click)="updateCandidate()">Actualizar</button>
        </div>
    </form>
</div>
